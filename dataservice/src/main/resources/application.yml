server:
  port: 8081
  servlet:
    context-path: /dataservice

spring:
  application:
    name: dataservice
  threads:
    virtual:
      enabled: true

app:
  model:
    default-threshold: 0.75
    version: "v4.2.0-beta"
    path: "/mnt/models/fraud.onnx"

