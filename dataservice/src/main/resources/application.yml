server:
  port: 8081
  servlet:
    context-path: /dataservice

spring:
  application:
    name: dataservice
  # Adicione este bloco para permitir arquivos maiores
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB
  threads:
    virtual:
      enabled: true

app:
  model:
    default-threshold: 0.75
    version: "v4.2.0-beta"
    path: "/mnt/models/fraud.onnx"

cleaning:
  agent-name: "Elite-Cleaner-v1"
  strategy: "Deep-Data-Scrubbing"